# Minimal release workflow: on x.y.z tag push, create a GitHub Release.
# Heavy monorepo build steps have been removed for the wheel-publish pilot.

name: Release

on:
  push:
    tags:
      - 'v?[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: write   # required for create-release

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Create Release
        uses: softprops/action-gh-release@975c1b265e11dd76618af1c374e7981f9a6ff44a
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Archipelago ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

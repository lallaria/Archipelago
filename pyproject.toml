# Auto-generated fallback pyproject.toml.
# This template is only used when the per-world repo does NOT ship
# `worlds/khddd/pyproject.toml` of its own. If the maintainer ships one,
# it is used as-is (with `version` and `authors` injected from archipelago.json
# if missing) — see scripts/shape_orphan.py.

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "worlds.khddd"
version = "0.0.3"
description = "MultiWorld: Kingdom Hearts Dream Drop Distance"
classifiers = ["Private :: Do Not Upload"]
requires-python = ">=3.12"

[[project.authors]]
name = "LuxMake"


[tool.setuptools.packages.find]
where = ["src"]
include = ["worlds.khddd"]
namespaces = true
